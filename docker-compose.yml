version: "3.9"

# ────────────────────────────────────────────────────────────────────────────
# CoinEx Trade Bot — Docker Compose
# ────────────────────────────────────────────────────────────────────────────
#
# Usage:
#   Paper mode (default):  docker compose up
#   Live mode:             docker compose --profile live up
#   With monitoring:       docker compose --profile monitoring up
#
# Required env vars (set in .env or export):
#   COINEX_ACCESS_ID   - your CoinEx API access ID
#   COINEX_SECRET_KEY  - your CoinEx API secret key
#   TELEGRAM_BOT_TOKEN - (optional) Telegram bot token for alerts
#   TELEGRAM_CHAT_ID   - (optional) Telegram chat ID

services:

  # ──────────────────────────────────────────────────────────────────────────
  # Main trading bot
  # ──────────────────────────────────────────────────────────────────────────
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    image: coinex-bot:latest
    container_name: coinex-bot
    restart: unless-stopped
    volumes:
      - ./configs:/configs:ro
      - bot-data:/data
    environment:
      - COINEX_ACCESS_ID=${COINEX_ACCESS_ID:-}
      - COINEX_SECRET_KEY=${COINEX_SECRET_KEY:-}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
      - TZ=UTC
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ──────────────────────────────────────────────────────────────────────────
  # Prometheus scrape target (bot exposes /metrics if enabled)
  # ──────────────────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: coinex-prometheus
    profiles: ["monitoring"]
    volumes:
      - ./deploy/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
    restart: unless-stopped

  # ──────────────────────────────────────────────────────────────────────────
  # Grafana dashboard
  # ──────────────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.3.1
    container_name: coinex-grafana
    profiles: ["monitoring"]
    depends_on:
      - prometheus
    volumes:
      - grafana-data:/var/lib/grafana
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    ports:
      - "3000:3000"
    restart: unless-stopped

volumes:
  bot-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
